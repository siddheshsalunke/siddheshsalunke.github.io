<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Google Cloud Certified Generative AI Leader">
  <defs>
    <path id="gcpTop" d="M 33 100 A 67 67 0 0 1 167 100" fill="none"/>
    <path id="gcpBot" d="M 35 100 A 65 65 0 0 0 165 100" fill="none"/>
    <!-- clip that reveals only the cloud silhouette; the four colored wedges sit behind it -->
    <clipPath id="cloudClip">
      <path d="M 82 118
               a 15 15 0 0 1 -1 -30
               a 21 21 0 0 1 40 -6
               a 15 15 0 0 1 4 36 Z"/>
    </clipPath>
  </defs>

  <!-- badge body -->
  <circle cx="100" cy="100" r="97" fill="#ffffff" stroke="#dadce0" stroke-width="2"/>
  <path d="M 22 119 A 81 81 0 0 1 22 81" fill="none" stroke="#dadce0" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M 178 81 A 81 81 0 0 1 178 119" fill="none" stroke="#dadce0" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="100" cy="100" r="57" fill="#ffffff" stroke="#dadce0" stroke-width="3"/>

  <text font-family="Arial, Helvetica, sans-serif" font-size="18.5" font-weight="500" fill="#5f6368" letter-spacing="0.4">
    <textPath href="#gcpTop" startOffset="50%" text-anchor="middle">Generative AI Leader</textPath>
  </text>
  <text font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#5f6368" letter-spacing="2.2">
    <textPath href="#gcpBot" startOffset="50%" text-anchor="middle">GOOGLE CLOUD CERTIFIED</textPath>
  </text>

  <!-- Four-color cloud: colored background wedges clipped to the cloud shape -->
  <g clip-path="url(#cloudClip)">
    <rect x="60" y="78" width="43" height="22" fill="#ea4335"/>   <!-- red, top-left -->
    <rect x="103" y="78" width="43" height="22" fill="#4285f4"/>  <!-- blue, top-right -->
    <rect x="103" y="100" width="43" height="26" fill="#34a853"/> <!-- green, bottom-right -->
    <rect x="60" y="100" width="43" height="26" fill="#fbbc05"/>  <!-- yellow, bottom-left -->
  </g>
  <!-- white inner cutout to give the hollow-cloud look -->
  <path d="M 88 110
           a 8 8 0 0 1 0 -12
           a 12 12 0 0 1 23 -3
           a 8 8 0 0 1 1 15 Z"
        fill="#ffffff"/>
</svg>
